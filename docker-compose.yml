services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: smart-garden-front
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./front/.env
    environment:
      PORT: "4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
